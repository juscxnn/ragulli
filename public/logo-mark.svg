  Hand-built V1 logo. Regenerate via image gen per spec §10.2 once tooling is available.

  Brief: abstract "library stamp" feel. Deep forest teal background, warm amber mark.
  Concept: three horizontal bars (indexed documents) with a small opening-book glyph on
  the left, in a soft amber on the deep teal. Reads at 32×32 (favicon) and 1024×1024 (OG).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="RAGülli mark">
  <rect width="512" height="512" rx="96" fill="#0B2027"/>
  <g transform="translate(96 96)" fill="none" stroke="#E0B158" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- spine / opening-book glyph on the left -->
    <path d="M40 40 L40 280"/>
    <path d="M40 40 L40 280 L200 240 L200 0 Z" fill="#E0B158" fill-opacity="0.10"/>
    <!-- three horizontal bars (indexed documents) -->
    <line x1="220" y1="80" x2="380" y2="80"/>
    <line x1="220" y1="160" x2="380" y2="160"/>
    <line x1="220" y1="240" x2="320" y2="240"/>
  </g>
</svg>
