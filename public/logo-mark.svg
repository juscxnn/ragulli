<?xml version="1.0" encoding="UTF-8"?>
<!--
  SPDX-License-Identifier: AGPL-3.0-only
  Copyright (c) 2026 RAGülli contributors

  Logo mark v3. The two diaeresis dots ARE the mark — nothing else.
  Concept: at any scale, two well-separated amber discs on a deep
  forest-teal field. The wordmark carries the actual letters; the
  mark carries only the umlaut, which is the only thing that makes
  "RAGulli" different from every other RAG tool with a similar name.

  Why no extra shapes: previous versions added lines, glyphs, frames
  to "fill" the canvas, and ended up reading as random AI-generated
  geometry. The constraint forces the dots to do the work alone —
  which is what makes the mark distinctive.

  Reads at 16×16 (favicon), 32×32, and 1024×1024 (OG).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="RAGülli mark">
  <!-- Bleed teal field, generous corner radius for app-icon familiarity -->
  <rect width="512" height="512" rx="112" ry="112" fill="#0B2027"/>

  <!-- The two diaeresis dots. Amber. Well-separated (124px center-to-center
       out of 512 canvas width — about 24% of width). Vertically centered
       exactly. Same size, no asymmetry. No "page line" beneath — restraint. -->
  <circle cx="194" cy="256" r="56" fill="#E0B158"/>
  <circle cx="318" cy="256" r="56" fill="#E0B158"/>
</svg>