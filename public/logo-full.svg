  Hand-built V1 lockup. Regenerate via image gen per spec §10.2 once tooling is available.

  The wordmark "RAGülli" MUST contain U+0308 (combining diaeresis) on the u. We
  embed it as a literal Unicode character in the <text> element. The serif is
  Lora; if it is not installed at render time the browser falls back to a
  generic serif, which is acceptable for the OG image export (resvg-js falls
  back to a system serif for the conversion). The build script renders the
  text via system fonts to PNG.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 256" role="img" aria-label="RAGülli — Private RAG in your browser.">
  <rect width="1024" height="256" fill="#0B2027"/>
  <!-- mark on the left -->
  <g transform="translate(48 48) scale(0.3125)" fill="none" stroke="#E0B158" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 40 L40 280"/>
    <path d="M40 40 L40 280 L200 240 L200 0 Z" fill="#E0B158" fill-opacity="0.10"/>
    <line x1="220" y1="80" x2="380" y2="80"/>
    <line x1="220" y1="160" x2="380" y2="160"/>
    <line x1="220" y1="240" x2="320" y2="240"/>
  </g>
  <!-- wordmark -->
  <text x="200" y="138" font-family="'Lora', 'Source Serif Pro', Georgia, serif" font-size="96" font-weight="500" fill="#F2EDE0" letter-spacing="1">RAG&#x0308;lli</text>
  <text x="200" y="180" font-family="'Inter', system-ui, sans-serif" font-size="22" fill="#8FA396">Private RAG in your browser.</text>
</svg>
