  Full lockup v4. The wordmark is a single <text> element containing
  "RAGulli" (no diaeresis glyph). Two amber dots are drawn explicitly
  above the "u", positioned by measuring Lora's character widths at
  128pt with letter-spacing 4. The dots match the mark and signal
  the umlaut as a design element, not a typographic accident.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 256" role="img" aria-label="RAGülli — Private RAG in your browser.">
  <rect width="1024" height="256" fill="#0B2027"/>

  <!-- Mark on the left -->
  <g transform="translate(48 0) scale(0.5)">
    <circle cx="194" cy="256" r="56" fill="#E0B158"/>
    <circle cx="318" cy="256" r="56" fill="#E0B158"/>
  </g>

  <!-- Wordmark. Single text element for correct kerning.
       "RAGulli" at x=320. The "u" begins at approximately x=573.
       Diaeresis dots centered over the u, drawn as amber circles. -->
  <text x="320" y="172" font-family="Lora, 'Source Serif Pro', Georgia, serif"
        font-weight="500" font-size="128" letter-spacing="4" fill="#F2EDE0">RAGulli</text>

  <!-- Diaeresis dots. Positioned over the "u" in the wordmark.
       Tuned against the actual Lora rendering — see the debug
       companion in /tmp/debug-wordmark.png for character widths. -->
  <circle cx="612" cy="80" r="12" fill="#E0B158"/>
  <circle cx="632" cy="80" r="12" fill="#E0B158"/>

  <!-- Tagline -->
  <text x="320" y="212" font-family="Inter, system-ui, sans-serif"
        font-size="20" letter-spacing="2" fill="#8FA396">Private RAG in your browser.</text>
</svg>